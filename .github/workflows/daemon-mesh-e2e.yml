name: daemon-mesh-e2e

on:
  pull_request:
    branches:
      - master

jobs:
  daemon-mesh-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build tassh release binary
        run: cargo build --release

      - name: Run daemon mesh E2E
        run: tests/daemon_mesh_e2e.sh
        env:
          TASSH_BIN: ${{ github.workspace }}/target/release/tassh
